<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Multiplier Ball Drop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #1a1225;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0; left: 0;
        }
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 10;
            pointer-events: none;
        }
        #overlay.active { pointer-events: all; background: rgba(0,0,0,0.6); }
        .panel {
            display: none;
            background: rgba(30, 20, 50, 0.95);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 40px 50px;
            text-align: center;
            color: #fff;
        }
        .panel.visible { display: block; }
        .panel h1 { font-size: 28px; margin-bottom: 8px; color: #f0c0e0; }
        .panel h2 { font-size: 22px; margin-bottom: 6px; color: #c0e0f0; }
        .panel p { font-size: 15px; color: #aaa; margin-bottom: 18px; line-height: 1.5; }
        .panel .score-display { font-size: 36px; color: #ffd700; margin: 10px 0; }
        .btn {
            padding: 14px 40px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #e07aff, #7a7aff);
            color: white;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(200,100,255,0.4); }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="overlay" class="active">
        <div id="startPanel" class="panel visible">
            <h1>Multiplier Ball Drop</h1>
            <p>Click the colored buckets to release balls.<br>
            Match ball colors to bricks to destroy them!<br>
            Pass through multiplier gates for more balls.<br>
            Clear rows to level up!</p>
            <button class="btn" id="startBtn">Start Game</button>
        </div>
        <div id="gameOverPanel" class="panel">
            <h2>Game Over</h2>
            <div class="score-display" id="finalScore">0</div>
            <p id="finalLevel">Level 1</p>
            <button class="btn" id="restartBtn">Play Again</button>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        // ─── Canvas Setup ───
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const startPanel = document.getElementById('startPanel');
        const gameOverPanel = document.getElementById('gameOverPanel');
        const finalScoreEl = document.getElementById('finalScore');
        const finalLevelEl = document.getElementById('finalLevel');

        let W, H, scale;
        const BASE_W = 420;
        const BASE_H = 750;

        function resize() {
            const aspect = BASE_W / BASE_H;
            if (window.innerWidth / window.innerHeight > aspect) {
                H = window.innerHeight;
                W = H * aspect;
            } else {
                W = window.innerWidth;
                H = W / aspect;
            }
            canvas.width = W;
            canvas.height = H;
            canvas.style.left = ((window.innerWidth - W) / 2) + 'px';
            canvas.style.top = ((window.innerHeight - H) / 2) + 'px';
            scale = W / BASE_W;
        }
        window.addEventListener('resize', resize);
        resize();

        // ─── Pastel Colors ───
        const COLORS = {
            red:    { pastel: '#ff9a9e', dark: '#c0505a' },
            orange: { pastel: '#ffc898', dark: '#b07040' },
            yellow: { pastel: '#fff5a0', dark: '#b0a040' },
            green:  { pastel: '#a8edba', dark: '#50a068' },
            blue:   { pastel: '#a0c4ff', dark: '#5070b0' },
            indigo: { pastel: '#b8a9e8', dark: '#6050a0' },
            violet: { pastel: '#d8a0ff', dark: '#8050b0' },
            pink:   { pastel: '#ffb8d0', dark: '#b05078' },
            black:  { pastel: '#b0b0b8', dark: '#505058' },
        };
        const COLOR_NAMES = Object.keys(COLORS);

        // ─── Game State ───
        let gameState = 'start'; // start, playing, gameover
        let score = 0;
        let level = 1;
        let screenShake = 0;
        let screenShakeX = 0;
        let screenShakeY = 0;
        let rotatingAngle = 0;

        // ─── Object Pool ───
        const MAX_BALLS = 600;
        const ballPool = [];
        let activeBalls = 0;

        function initPool() {
            ballPool.length = 0;
            activeBalls = 0;
            for (let i = 0; i < MAX_BALLS; i++) {
                ballPool.push({
                    active: false, x: 0, y: 0, vx: 0, vy: 0,
                    radius: 0, color: '', colorName: '',
                    multiplied: false,
                });
            }
        }

        function spawnBall(x, y, vx, vy, radius, colorName) {
            if (activeBalls >= MAX_BALLS) return null;
            for (let i = 0; i < MAX_BALLS; i++) {
                if (!ballPool[i].active) {
                    const b = ballPool[i];
                    b.active = true;
                    b.x = x; b.y = y;
                    b.vx = vx; b.vy = vy;
                    b.radius = radius;
                    b.colorName = colorName;
                    b.color = COLORS[colorName].pastel;
                    b.multiplied = false;
                    activeBalls++;
                    return b;
                }
            }
            return null;
        }

        function deactivateBall(b) {
            if (b.active) {
                b.active = false;
                activeBalls--;
            }
        }

        // ─── Particles ───
        const MAX_PARTICLES = 300;
        const particles = [];
        function initParticles() {
            particles.length = 0;
            for (let i = 0; i < MAX_PARTICLES; i++) {
                particles.push({ active: false, x: 0, y: 0, vx: 0, vy: 0, life: 0, maxLife: 0, color: '', size: 0 });
            }
        }

        function spawnParticles(x, y, color, count) {
            for (let c = 0; c < count; c++) {
                for (let i = 0; i < MAX_PARTICLES; i++) {
                    if (!particles[i].active) {
                        const p = particles[i];
                        p.active = true;
                        p.x = x; p.y = y;
                        const angle = Math.random() * Math.PI * 2;
                        const speed = 1 + Math.random() * 4;
                        p.vx = Math.cos(angle) * speed * scale;
                        p.vy = Math.sin(angle) * speed * scale;
                        p.life = 1;
                        p.maxLife = 30 + Math.random() * 20;
                        p.color = color;
                        p.size = (2 + Math.random() * 3) * scale;
                        break;
                    }
                }
            }
        }

        // ─── Buckets ───
        const NUM_BUCKETS = 4;
        let buckets = [];
        let bucketColors = [];

        function s(v) { return v * scale; }

        function initBuckets() {
            buckets = [];
            // Pick 4 colors that match the current bottom brick row
            assignBucketColors();
            const bucketW = s(70);
            const bucketH = s(50);
            const gap = (W - NUM_BUCKETS * bucketW) / (NUM_BUCKETS + 1);
            for (let i = 0; i < NUM_BUCKETS; i++) {
                buckets.push({
                    x: gap + i * (bucketW + gap),
                    y: s(10),
                    w: bucketW,
                    h: bucketH,
                    colorName: bucketColors[i],
                    color: COLORS[bucketColors[i]].pastel,
                    tweenScale: 1,
                    tweenDir: 0,
                    streaming: false,
                    streamTimer: 0,
                    streamInterval: 3,
                    streamDuration: 0,
                    maxStreamDuration: 60,
                });
            }
        }

        function assignBucketColors() {
            // Assign colors based on what's needed in the grid
            const needed = new Set();
            for (const brick of bricks) {
                if (brick.active) needed.add(brick.colorName);
            }
            const available = [...needed];
            bucketColors = [];
            // Pick up to 4 unique colors from what's needed
            while (bucketColors.length < NUM_BUCKETS && available.length > 0) {
                const idx = Math.floor(Math.random() * available.length);
                bucketColors.push(available.splice(idx, 1)[0]);
            }
            // Fill remaining with random colors
            while (bucketColors.length < NUM_BUCKETS) {
                bucketColors.push(COLOR_NAMES[Math.floor(Math.random() * COLOR_NAMES.length)]);
            }
            // Update bucket colors
            for (let i = 0; i < buckets.length; i++) {
                buckets[i].colorName = bucketColors[i];
                buckets[i].color = COLORS[bucketColors[i]].pastel;
            }
        }

        // ─── Multiplier Gates ───
        let gates = [];
        function initGates() {
            gates = [];
            const gateY = s(75);
            const gateH = s(20);
            const bucketW = s(70);
            const gap = (W - NUM_BUCKETS * bucketW) / (NUM_BUCKETS + 1);
            const multipliers = [2, 5, 3, 2];
            for (let i = 0; i < NUM_BUCKETS; i++) {
                const bx = gap + i * (bucketW + gap);
                gates.push({
                    x: bx,
                    y: gateY,
                    w: bucketW,
                    h: gateH,
                    multiplier: multipliers[i],
                    glow: 0,
                });
            }
        }

        // ─── Rotating Zone ───
        const ROTOR = {
            get cx() { return W / 2; },
            get cy() { return s(180); },
            get radius() { return s(70); },
            get openingAngle() { return 0.5; }, // radians of opening
            get wallThickness() { return s(6); },
        };

        // ─── Bricks Grid ───
        const GRID_COLS = 9;
        const GRID_ROWS_VISIBLE = 6;
        let bricks = [];
        let brickW, brickH, gridOffsetX, gridStartY;

        function initGrid() {
            bricks = [];
            brickW = (W - s(20)) / GRID_COLS;
            brickH = s(28);
            gridOffsetX = s(10);
            gridStartY = H - GRID_ROWS_VISIBLE * brickH - s(10);

            for (let row = 0; row < GRID_ROWS_VISIBLE; row++) {
                spawnBrickRow(row);
            }
        }

        function spawnBrickRow(row) {
            // Each row uses a subset of colors
            const rowColors = [];
            const numColors = 2 + Math.floor(Math.random() * 3); // 2-4 colors per row
            const available = [...COLOR_NAMES];
            for (let c = 0; c < numColors; c++) {
                const idx = Math.floor(Math.random() * available.length);
                rowColors.push(available.splice(idx, 1)[0]);
            }

            for (let col = 0; col < GRID_COLS; col++) {
                const colorName = rowColors[col % rowColors.length];
                bricks.push({
                    active: true,
                    row, col,
                    x: gridOffsetX + col * brickW,
                    y: gridStartY + row * brickH,
                    w: brickW - s(2),
                    h: brickH - s(2),
                    colorName,
                    color: COLORS[colorName].pastel,
                    darkColor: COLORS[colorName].dark,
                    health: 3,
                    maxHealth: 3,
                    pulseTimer: 0,
                });
            }
        }

        function checkRowCleared() {
            // Group bricks by row
            const rows = {};
            for (const brick of bricks) {
                if (brick.active) {
                    if (!rows[brick.row]) rows[brick.row] = 0;
                    rows[brick.row]++;
                }
            }

            // Find cleared rows (row with 0 active bricks)
            const allRows = new Set(bricks.map(b => b.row));
            let cleared = false;
            for (const row of allRows) {
                if (!rows[row]) {
                    // Row is cleared
                    cleared = true;
                }
            }

            if (cleared) {
                // Remove all inactive bricks from cleared rows
                bricks = bricks.filter(b => b.active);

                // Shift remaining bricks down
                if (bricks.length > 0) {
                    // Recalculate rows
                    const uniqueRows = [...new Set(bricks.map(b => b.row))].sort((a, b) => a - b);
                    for (let i = 0; i < uniqueRows.length; i++) {
                        for (const brick of bricks) {
                            if (brick.row === uniqueRows[i]) {
                                brick.row = i;
                                brick.y = gridStartY + i * brickH;
                            }
                        }
                    }
                }

                // Spawn new row at top (shift existing down, add at row 0)
                // First shift all existing rows down by 1
                for (const brick of bricks) {
                    brick.row++;
                    brick.y = gridStartY + brick.row * brickH;
                }
                spawnBrickRow(0);

                level++;
                score += 100 * level;
                screenShake = 10;

                // Reassign bucket colors based on new grid
                assignBucketColors();
            }

            // Check game over: if any brick goes below screen
            for (const brick of bricks) {
                if (brick.active && brick.y + brick.h > H) {
                    endGame();
                    return;
                }
            }
        }

        // ─── Game Init ───
        function initGame() {
            initPool();
            initParticles();
            score = 0;
            level = 1;
            screenShake = 0;
            rotatingAngle = 0;
            initGrid();
            initBuckets();
            initGates();
            gameState = 'playing';
            overlay.classList.remove('active');
            startPanel.classList.remove('visible');
            gameOverPanel.classList.remove('visible');
        }

        function endGame() {
            gameState = 'gameover';
            finalScoreEl.textContent = score;
            finalLevelEl.textContent = 'Level ' + level;
            overlay.classList.add('active');
            gameOverPanel.classList.add('visible');
        }

        // ─── Input ───
        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function handleClick(e) {
            if (gameState !== 'playing') return;
            const pos = getCanvasPos(e);

            for (const bucket of buckets) {
                if (pos.x >= bucket.x && pos.x <= bucket.x + bucket.w &&
                    pos.y >= bucket.y && pos.y <= bucket.y + bucket.h) {
                    bucket.streaming = true;
                    bucket.streamDuration = 0;
                    bucket.streamTimer = 0;
                    bucket.tweenDir = 1;
                    bucket.tweenScale = 1.2;
                }
            }
        }

        canvas.addEventListener('click', handleClick);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick(e);
        });

        document.getElementById('startBtn').addEventListener('click', initGame);
        document.getElementById('restartBtn').addEventListener('click', initGame);

        // ─── Physics Update ───
        const GRAVITY = 0.15;
        const BALL_RADIUS = 4;
        const BOUNCE_DAMP = 0.6;

        function pointInRotorWall(x, y) {
            const dx = x - ROTOR.cx;
            const dy = y - ROTOR.cy;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const angle = Math.atan2(dy, dx) - rotatingAngle;
            const normalizedAngle = ((angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
            const openStart = Math.PI / 2 - ROTOR.openingAngle / 2;
            const openEnd = Math.PI / 2 + ROTOR.openingAngle / 2;
            const inOpening = normalizedAngle >= openStart && normalizedAngle <= openEnd;

            return {
                insideOuter: dist < ROTOR.radius + ROTOR.wallThickness,
                insideInner: dist < ROTOR.radius - ROTOR.wallThickness,
                onWall: dist >= ROTOR.radius - ROTOR.wallThickness && dist <= ROTOR.radius + ROTOR.wallThickness,
                inOpening,
                dist,
                angle: normalizedAngle,
            };
        }

        function update() {
            if (gameState !== 'playing') return;

            rotatingAngle += 0.008;

            // Screen shake decay
            if (screenShake > 0) {
                screenShake *= 0.9;
                screenShakeX = (Math.random() - 0.5) * screenShake * scale;
                screenShakeY = (Math.random() - 0.5) * screenShake * scale;
                if (screenShake < 0.1) { screenShake = 0; screenShakeX = 0; screenShakeY = 0; }
            }

            // Update buckets
            for (const bucket of buckets) {
                // Tween
                if (bucket.tweenDir !== 0) {
                    if (bucket.tweenDir === 1) {
                        bucket.tweenScale += 0.02;
                        if (bucket.tweenScale >= 1.15) bucket.tweenDir = -1;
                    } else {
                        bucket.tweenScale -= 0.02;
                        if (bucket.tweenScale <= 1) {
                            bucket.tweenScale = 1;
                            bucket.tweenDir = 0;
                        }
                    }
                }

                // Stream balls
                if (bucket.streaming) {
                    bucket.streamTimer++;
                    bucket.streamDuration++;
                    if (bucket.streamTimer >= bucket.streamInterval) {
                        bucket.streamTimer = 0;
                        const bx = bucket.x + bucket.w / 2 + (Math.random() - 0.5) * s(20);
                        const by = bucket.y + bucket.h;
                        const r = s(BALL_RADIUS);
                        spawnBall(bx, by, (Math.random() - 0.5) * s(0.5), s(1.5 + Math.random()), r, bucket.colorName);
                    }
                    if (bucket.streamDuration >= bucket.maxStreamDuration) {
                        bucket.streaming = false;
                    }
                }
            }

            // Update balls
            for (let i = 0; i < ballPool.length; i++) {
                const b = ballPool[i];
                if (!b.active) continue;

                b.vy += GRAVITY * scale;
                b.x += b.vx;
                b.y += b.vy;

                // Wall bounce
                if (b.x - b.radius < 0) { b.x = b.radius; b.vx = Math.abs(b.vx) * BOUNCE_DAMP; }
                if (b.x + b.radius > W) { b.x = W - b.radius; b.vx = -Math.abs(b.vx) * BOUNCE_DAMP; }

                // Check gate collision
                if (!b.multiplied) {
                    for (const gate of gates) {
                        if (b.x >= gate.x && b.x <= gate.x + gate.w &&
                            b.y >= gate.y && b.y <= gate.y + gate.h) {
                            b.multiplied = true;
                            gate.glow = 1;
                            // Spawn extra balls
                            for (let m = 1; m < gate.multiplier; m++) {
                                spawnBall(
                                    b.x + (Math.random() - 0.5) * s(10),
                                    b.y,
                                    (Math.random() - 0.5) * s(2),
                                    b.vy * (0.8 + Math.random() * 0.4),
                                    b.radius,
                                    b.colorName
                                );
                            }
                            break;
                        }
                    }
                }

                // Rotating zone collision
                const dx = b.x - ROTOR.cx;
                const dy = b.y - ROTOR.cy;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const rotorInfo = pointInRotorWall(b.x, b.y);

                if (dist > ROTOR.radius - b.radius && dist < ROTOR.radius + b.radius + ROTOR.wallThickness) {
                    if (!rotorInfo.inOpening && rotorInfo.onWall) {
                        // Bounce off wall
                        const nx = dx / dist;
                        const ny = dy / dist;
                        if (dist < ROTOR.radius) {
                            // Inside, push outward? Actually push inward to contain
                            b.x = ROTOR.cx + nx * (ROTOR.radius - b.radius - ROTOR.wallThickness);
                            const dot = b.vx * nx + b.vy * ny;
                            b.vx -= 2 * dot * nx * BOUNCE_DAMP;
                            b.vy -= 2 * dot * ny * BOUNCE_DAMP;
                        } else {
                            b.x = ROTOR.cx + nx * (ROTOR.radius + b.radius + ROTOR.wallThickness);
                            const dot = b.vx * nx + b.vy * ny;
                            b.vx -= 2 * dot * nx * BOUNCE_DAMP;
                            b.vy -= 2 * dot * ny * BOUNCE_DAMP;
                        }
                    }
                }

                // Inside rotor - apply gentle swirl
                if (dist < ROTOR.radius - ROTOR.wallThickness && dist > 0) {
                    const tangentX = -dy / dist;
                    const tangentY = dx / dist;
                    b.vx += tangentX * 0.02 * scale;
                    b.vy += tangentY * 0.02 * scale;
                }

                // Brick collisions
                for (const brick of bricks) {
                    if (!brick.active) continue;

                    // AABB vs circle
                    const closestX = Math.max(brick.x, Math.min(b.x, brick.x + brick.w));
                    const closestY = Math.max(brick.y, Math.min(b.y, brick.y + brick.h));
                    const cdx = b.x - closestX;
                    const cdy = b.y - closestY;
                    const cdist = Math.sqrt(cdx * cdx + cdy * cdy);

                    if (cdist < b.radius) {
                        // Bounce ball
                        if (cdist > 0) {
                            const nx = cdx / cdist;
                            const ny = cdy / cdist;
                            b.x = closestX + nx * b.radius;
                            b.y = closestY + ny * b.radius;
                            const dot = b.vx * nx + b.vy * ny;
                            b.vx -= 2 * dot * nx * BOUNCE_DAMP;
                            b.vy -= 2 * dot * ny * BOUNCE_DAMP;
                        } else {
                            b.vy = -Math.abs(b.vy) * BOUNCE_DAMP;
                            b.y = brick.y - b.radius;
                        }

                        // Color match check
                        if (b.colorName === brick.colorName) {
                            brick.health--;
                            brick.pulseTimer = 8;
                            score += 10;
                            if (brick.health <= 0) {
                                brick.active = false;
                                score += 50;
                                spawnParticles(brick.x + brick.w / 2, brick.y + brick.h / 2, brick.color, 15);
                                screenShake = 4;
                            }
                        }

                        deactivateBall(b);
                        break;
                    }
                }

                // Off screen bottom
                if (b.y > H + s(20)) {
                    deactivateBall(b);
                }
            }

            // Update gate glow
            for (const gate of gates) {
                if (gate.glow > 0) gate.glow -= 0.03;
            }

            // Update particles
            for (const p of particles) {
                if (!p.active) continue;
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.05 * scale;
                p.life -= 1 / p.maxLife;
                if (p.life <= 0) p.active = false;
            }

            // Brick pulse timer
            for (const brick of bricks) {
                if (brick.pulseTimer > 0) brick.pulseTimer--;
            }

            // Check row clears
            checkRowCleared();
        }

        // ─── Drawing ───
        function drawRoundRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        function draw() {
            ctx.save();
            ctx.clearRect(0, 0, W, H);

            // Background gradient
            const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
            bgGrad.addColorStop(0, '#1a1230');
            bgGrad.addColorStop(1, '#0d0a1a');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, W, H);

            // Apply screen shake
            ctx.translate(screenShakeX, screenShakeY);

            // Draw buckets
            for (const bucket of buckets) {
                ctx.save();
                const cx = bucket.x + bucket.w / 2;
                const cy = bucket.y + bucket.h / 2;
                ctx.translate(cx, cy);
                ctx.scale(bucket.tweenScale, bucket.tweenScale);
                ctx.translate(-cx, -cy);

                // Bucket body
                const grad = ctx.createLinearGradient(bucket.x, bucket.y, bucket.x, bucket.y + bucket.h);
                grad.addColorStop(0, bucket.color);
                grad.addColorStop(1, COLORS[bucket.colorName].dark);
                drawRoundRect(bucket.x, bucket.y, bucket.w, bucket.h, s(8));
                ctx.fillStyle = grad;
                ctx.fill();

                // Bucket rim
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = s(2);
                ctx.stroke();

                // Bucket opening (bottom arc)
                ctx.beginPath();
                ctx.arc(cx, bucket.y + bucket.h, s(8), 0, Math.PI, false);
                ctx.fillStyle = COLORS[bucket.colorName].dark;
                ctx.fill();

                // Label
                ctx.fillStyle = '#fff';
                ctx.font = `bold ${s(11)}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(bucket.colorName.toUpperCase(), cx, cy);

                ctx.restore();
            }

            // Draw gates
            for (const gate of gates) {
                ctx.globalAlpha = 0.5 + gate.glow * 0.5;
                drawRoundRect(gate.x, gate.y, gate.w, gate.h, s(4));
                ctx.fillStyle = `rgba(255, 220, 100, ${0.15 + gate.glow * 0.3})`;
                ctx.fill();
                ctx.strokeStyle = `rgba(255, 220, 100, ${0.6 + gate.glow * 0.4})`;
                ctx.lineWidth = s(1.5);
                ctx.stroke();

                ctx.fillStyle = '#ffd700';
                ctx.font = `bold ${s(12)}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`x${gate.multiplier}`, gate.x + gate.w / 2, gate.y + gate.h / 2);
                ctx.globalAlpha = 1;
            }

            // Draw rotating zone
            ctx.save();
            ctx.translate(ROTOR.cx, ROTOR.cy);
            ctx.rotate(rotatingAngle);

            const openStart = Math.PI / 2 - ROTOR.openingAngle / 2;
            const openEnd = Math.PI / 2 + ROTOR.openingAngle / 2;

            // Outer arc (with gap for opening)
            ctx.beginPath();
            ctx.arc(0, 0, ROTOR.radius, openEnd, openStart + Math.PI * 2);
            ctx.strokeStyle = 'rgba(180, 160, 255, 0.5)';
            ctx.lineWidth = ROTOR.wallThickness;
            ctx.lineCap = 'round';
            ctx.stroke();

            // Inner glow
            ctx.beginPath();
            ctx.arc(0, 0, ROTOR.radius, openEnd, openStart + Math.PI * 2);
            ctx.strokeStyle = 'rgba(180, 160, 255, 0.15)';
            ctx.lineWidth = ROTOR.wallThickness + s(6);
            ctx.stroke();

            // Opening indicator arrows
            ctx.beginPath();
            const arrowR = ROTOR.radius;
            const a1x = Math.cos(openStart) * arrowR;
            const a1y = Math.sin(openStart) * arrowR;
            const a2x = Math.cos(openEnd) * arrowR;
            const a2y = Math.sin(openEnd) * arrowR;
            ctx.fillStyle = 'rgba(180, 160, 255, 0.8)';
            ctx.beginPath();
            ctx.arc(a1x, a1y, s(4), 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(a2x, a2y, s(4), 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            // Draw bricks
            for (const brick of bricks) {
                if (!brick.active) continue;

                ctx.save();
                const pulse = brick.pulseTimer > 0 ? 1 + Math.sin(brick.pulseTimer * 0.8) * 0.08 : 1;
                if (pulse !== 1) {
                    const bcx = brick.x + brick.w / 2;
                    const bcy = brick.y + brick.h / 2;
                    ctx.translate(bcx, bcy);
                    ctx.scale(pulse, pulse);
                    ctx.translate(-bcx, -bcy);
                }

                drawRoundRect(brick.x, brick.y, brick.w, brick.h, s(4));
                const brickGrad = ctx.createLinearGradient(brick.x, brick.y, brick.x, brick.y + brick.h);
                brickGrad.addColorStop(0, brick.color);
                brickGrad.addColorStop(1, brick.darkColor);
                ctx.fillStyle = brickGrad;
                ctx.fill();

                // Health indicator
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.font = `bold ${s(10)}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(brick.health, brick.x + brick.w / 2, brick.y + brick.h / 2);

                // Shine
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.fillRect(brick.x + s(2), brick.y + s(2), brick.w - s(4), brick.h * 0.35);

                ctx.restore();
            }

            // Draw balls
            for (let i = 0; i < ballPool.length; i++) {
                const b = ballPool[i];
                if (!b.active) continue;

                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                const ballGrad = ctx.createRadialGradient(
                    b.x - b.radius * 0.3, b.y - b.radius * 0.3, 0,
                    b.x, b.y, b.radius
                );
                ballGrad.addColorStop(0, '#fff');
                ballGrad.addColorStop(0.4, b.color);
                ballGrad.addColorStop(1, COLORS[b.colorName].dark);
                ctx.fillStyle = ballGrad;
                ctx.fill();
            }

            // Draw particles
            for (const p of particles) {
                if (!p.active) continue;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                ctx.globalAlpha = 1;
            }

            // HUD
            ctx.fillStyle = '#fff';
            ctx.font = `bold ${s(16)}px sans-serif`;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText(`Score: ${score}`, s(10), H - s(28));

            ctx.textAlign = 'right';
            ctx.fillText(`Level ${level}`, W - s(10), H - s(28));

            // Ball count indicator
            ctx.textAlign = 'center';
            ctx.font = `${s(10)}px sans-serif`;
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.fillText(`Balls: ${activeBalls}`, W / 2, H - s(28));

            ctx.restore();
        }

        // ─── Game Loop ───
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    })();
    </script>
</body>
