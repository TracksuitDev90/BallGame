<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Multiplier Ball Drop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #1a1225;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0; left: 0;
        }
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 10;
            pointer-events: none;
        }
        #overlay.active { pointer-events: all; background: rgba(0,0,0,0.6); }
        .panel {
            display: none;
            background: rgba(30, 20, 50, 0.95);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 40px 50px;
            text-align: center;
            color: #fff;
        }
        .panel.visible { display: block; }
        .panel h1 { font-size: 28px; margin-bottom: 8px; color: #f0c0e0; }
        .panel h2 { font-size: 22px; margin-bottom: 6px; color: #c0e0f0; }
        .panel p { font-size: 15px; color: #aaa; margin-bottom: 18px; line-height: 1.5; }
        .panel .score-display { font-size: 36px; color: #ffd700; margin: 10px 0; }
        .btn {
            padding: 14px 40px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #e07aff, #7a7aff);
            color: white;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(200,100,255,0.4); }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="overlay" class="active">
        <div id="startPanel" class="panel visible">
            <h1>Multiplier Ball Drop</h1>
            <p>Click the colored buckets to release balls.<br>
            Match ball colors to bricks to destroy them!<br>
            Pass through multiplier gates for more balls.<br>
            Clear rows to level up!</p>
            <button class="btn" id="startBtn">Start Game</button>
        </div>
        <div id="gameOverPanel" class="panel">
            <h2>Game Over</h2>
            <div class="score-display" id="finalScore">0</div>
            <p id="finalLevel">Level 1</p>
            <button class="btn" id="restartBtn">Play Again</button>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        // ─── Canvas Setup ───
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const startPanel = document.getElementById('startPanel');
        const gameOverPanel = document.getElementById('gameOverPanel');
        const finalScoreEl = document.getElementById('finalScore');
        const finalLevelEl = document.getElementById('finalLevel');

        let W, H, scale;
        const BASE_W = 420;
        const BASE_H = 750;

        function resize() {
            const aspect = BASE_W / BASE_H;
            if (window.innerWidth / window.innerHeight > aspect) {
                H = window.innerHeight;
                W = H * aspect;
            } else {
                W = window.innerWidth;
                H = W / aspect;
            }
            canvas.width = W;
            canvas.height = H;
            canvas.style.left = ((window.innerWidth - W) / 2) + 'px';
            canvas.style.top = ((window.innerHeight - H) / 2) + 'px';
            scale = W / BASE_W;
        }
        window.addEventListener('resize', resize);
        resize();

        // ─── iOS 26 Liquid Glass Colors ───
        const COLORS = {
            red:    { pastel: '#ff8a8a', mid: '#ff6b6b', dark: '#d94040', glass: 'rgba(255,120,120,0.45)' },
            orange: { pastel: '#ffb474', mid: '#ff9a52', dark: '#cc7030', glass: 'rgba(255,160,90,0.45)' },
            yellow: { pastel: '#ffe66a', mid: '#ffd93d', dark: '#c4a820', glass: 'rgba(255,225,80,0.45)' },
            green:  { pastel: '#7ddfb0', mid: '#5cc98a', dark: '#3a9a60', glass: 'rgba(100,210,150,0.45)' },
            blue:   { pastel: '#82b4ff', mid: '#5a95ff', dark: '#3060c0', glass: 'rgba(100,160,255,0.45)' },
            indigo: { pastel: '#a893e0', mid: '#8a72d0', dark: '#5a40a0', glass: 'rgba(140,120,220,0.45)' },
            violet: { pastel: '#cc85f0', mid: '#b560e0', dark: '#8040b0', glass: 'rgba(190,120,240,0.45)' },
            pink:   { pastel: '#ff9ec0', mid: '#ff78a8', dark: '#c84878', glass: 'rgba(255,140,190,0.45)' },
        };
        const COLOR_NAMES = Object.keys(COLORS);
        const NUM_GAME_COLORS = 5; // how many colors active at once (matches NUM_BUCKETS)
        let gameColors = []; // the 5 active color names

        // ─── Game State ───
        let gameState = 'start'; // start, playing, gameover
        let score = 0;
        let level = 1;
        let screenShake = 0;
        let screenShakeX = 0;
        let screenShakeY = 0;
        let rotatingAngle = 0;

        // ─── Object Pool ───
        const MAX_BALLS = 600;
        const ballPool = [];
        let activeBalls = 0;

        function initPool() {
            ballPool.length = 0;
            activeBalls = 0;
            for (let i = 0; i < MAX_BALLS; i++) {
                ballPool.push({
                    active: false, x: 0, y: 0, vx: 0, vy: 0,
                    radius: 0, color: '', colorName: '',
                    multiplied: false,
                });
            }
        }

        function spawnBall(x, y, vx, vy, radius, colorName) {
            if (activeBalls >= MAX_BALLS) return null;
            for (let i = 0; i < MAX_BALLS; i++) {
                if (!ballPool[i].active) {
                    const b = ballPool[i];
                    b.active = true;
                    b.x = x; b.y = y;
                    b.vx = vx; b.vy = vy;
                    b.radius = radius;
                    b.colorName = colorName;
                    b.color = COLORS[colorName].pastel;
                    b.multiplied = false;
                    activeBalls++;
                    return b;
                }
            }
            return null;
        }

        function deactivateBall(b) {
            if (b.active) {
                b.active = false;
                activeBalls--;
            }
        }

        // ─── Particles ───
        const MAX_PARTICLES = 300;
        const particles = [];
        function initParticles() {
            particles.length = 0;
            for (let i = 0; i < MAX_PARTICLES; i++) {
                particles.push({ active: false, x: 0, y: 0, vx: 0, vy: 0, life: 0, maxLife: 0, color: '', size: 0 });
            }
        }

        function spawnParticles(x, y, color, count) {
            for (let c = 0; c < count; c++) {
                for (let i = 0; i < MAX_PARTICLES; i++) {
                    if (!particles[i].active) {
                        const p = particles[i];
                        p.active = true;
                        p.x = x; p.y = y;
                        const angle = Math.random() * Math.PI * 2;
                        const speed = 1 + Math.random() * 4;
                        p.vx = Math.cos(angle) * speed * scale;
                        p.vy = Math.sin(angle) * speed * scale;
                        p.life = 1;
                        p.maxLife = 30 + Math.random() * 20;
                        p.color = color;
                        p.size = (2 + Math.random() * 3) * scale;
                        break;
                    }
                }
            }
        }

        // ─── Buckets (synced 1:1 with game colors) ───
        const NUM_BUCKETS = 5;
        let buckets = [];

        function s(v) { return v * scale; }

        function pickGameColors() {
            // Pick NUM_GAME_COLORS unique colors for this session
            const available = [...COLOR_NAMES];
            gameColors = [];
            while (gameColors.length < NUM_GAME_COLORS) {
                const idx = Math.floor(Math.random() * available.length);
                gameColors.push(available.splice(idx, 1)[0]);
            }
        }

        function initBuckets() {
            buckets = [];
            const bucketW = s(60);
            const bucketH = s(46);
            const totalW = NUM_BUCKETS * bucketW;
            const gap = (W - totalW) / (NUM_BUCKETS + 1);
            for (let i = 0; i < NUM_BUCKETS; i++) {
                buckets.push({
                    x: gap + i * (bucketW + gap),
                    y: s(10),
                    w: bucketW,
                    h: bucketH,
                    colorName: gameColors[i],
                    color: COLORS[gameColors[i]].pastel,
                    tweenScale: 1,
                    tweenDir: 0,
                    streaming: false,
                    streamTimer: 0,
                    streamInterval: 3,
                    streamDuration: 0,
                    maxStreamDuration: 60,
                });
            }
        }

        function getActiveGridColors() {
            const needed = new Set();
            for (const brick of bricks) {
                if (brick.active && brick.popTimer <= 0) needed.add(brick.colorName);
            }
            return needed;
        }

        function syncBucketColors() {
            // Ensure every bucket color exists in grid; if a color was cleared, replace it
            const activeColors = getActiveGridColors();
            if (activeColors.size === 0) return;

            for (let i = 0; i < buckets.length; i++) {
                if (!activeColors.has(buckets[i].colorName)) {
                    // Find a color in grid not already on a bucket
                    const usedColors = new Set(buckets.map(b => b.colorName));
                    let replacement = null;
                    for (const c of activeColors) {
                        if (!usedColors.has(c)) { replacement = c; break; }
                    }
                    if (!replacement) {
                        const arr = [...activeColors];
                        replacement = arr[Math.floor(Math.random() * arr.length)];
                    }
                    buckets[i].colorName = replacement;
                    buckets[i].color = COLORS[replacement].pastel;
                    gameColors[i] = replacement;
                    buckets[i].tweenScale = 1.2;
                    buckets[i].tweenDir = -1;
                }
            }
        }

        // ─── Multiplier Gates ───
        let gates = [];
        function initGates() {
            gates = [];
            const gateY = s(70);
            const gateH = s(20);
            const bucketW = s(60);
            const totalW = NUM_BUCKETS * bucketW;
            const gap = (W - totalW) / (NUM_BUCKETS + 1);
            const multipliers = [2, 3, 5, 3, 2];
            for (let i = 0; i < NUM_BUCKETS; i++) {
                const bx = gap + i * (bucketW + gap);
                gates.push({
                    x: bx,
                    y: gateY,
                    w: bucketW,
                    h: gateH,
                    multiplier: multipliers[i],
                    glow: 0,
                });
            }
        }

        // ─── Track Zone (stadium/pill shape spanning full width) ───
        const TRACK = {
            get cx() { return W / 2; },
            get cy() { return s(170); },
            get halfWidth() { return W / 2 - s(20); },  // straight section half-length
            get radius() { return s(35); },              // end-cap radius
            get wallThickness() { return s(6); },
            get openingWidth() { return s(40); },        // exit opening at bottom center
        };

        // ─── Bricks Grid ───
        const GRID_COLS = 5;
        const GRID_ROWS_VISIBLE = 6;
        const DIVOTS_PER_BRICK = 3;
        let bricks = [];
        let brickW, brickH, gridOffsetX, gridStartY;

        function initGrid() {
            bricks = [];
            brickW = (W - s(16)) / GRID_COLS;
            brickH = s(68);
            gridOffsetX = s(8);
            gridStartY = H - GRID_ROWS_VISIBLE * brickH - s(10);

            for (let row = 0; row < GRID_ROWS_VISIBLE; row++) {
                spawnBrickRow(row);
            }
        }

        function spawnBrickRow(row) {
            // Each row uses 2-3 colors from the active game colors (synced with buckets)
            const rowColors = [];
            const numColors = 2 + Math.floor(Math.random() * 2); // 2-3 colors per row
            const available = [...gameColors];
            for (let c = 0; c < numColors; c++) {
                const idx = Math.floor(Math.random() * available.length);
                rowColors.push(available.splice(idx, 1)[0]);
            }

            for (let col = 0; col < GRID_COLS; col++) {
                const colorName = rowColors[col % rowColors.length];
                bricks.push({
                    active: true,
                    row, col,
                    x: gridOffsetX + col * brickW,
                    y: gridStartY + row * brickH,
                    w: brickW - s(3),
                    h: brickH - s(3),
                    colorName,
                    color: COLORS[colorName].pastel,
                    darkColor: COLORS[colorName].dark,
                    health: DIVOTS_PER_BRICK,
                    maxHealth: DIVOTS_PER_BRICK,
                    divots: [false, false, false],
                    pulseTimer: 0,
                    popTimer: 0,
                    jellyPhase: Math.random() * Math.PI * 2, // jelly wobble offset
                });
            }
        }

        function checkRowCleared() {
            // Check each row: if ALL divots in ALL bricks of a row are filled, row is cleared
            const rowBricks = {};
            for (const brick of bricks) {
                if (!brick.active) continue;
                if (!rowBricks[brick.row]) rowBricks[brick.row] = [];
                rowBricks[brick.row].push(brick);
            }

            let cleared = false;
            for (const row in rowBricks) {
                const rowArr = rowBricks[row];
                // A row is "filled" when every brick in it has all divots filled (popping or already done)
                const allFilled = rowArr.every(b => b.health <= 0);
                if (allFilled) {
                    cleared = true;
                    // Mark all bricks in this row for popping if not already
                    for (const b of rowArr) {
                        if (b.popTimer <= 0 && b.active) {
                            b.popTimer = 12;
                        }
                    }
                }
            }

            // Remove fully popped bricks
            const hadPops = bricks.some(b => !b.active);
            bricks = bricks.filter(b => b.active);

            if (cleared || hadPops) {
                // Check if any rows are now completely gone
                const remainingRows = new Set(bricks.map(b => b.row));
                const sortedRows = [...remainingRows].sort((a, b) => a - b);

                // Compact rows: reassign row indices to be contiguous from bottom
                if (sortedRows.length > 0) {
                    // Remap rows so they stack from bottom
                    const maxRow = GRID_ROWS_VISIBLE - 1;
                    const offset = maxRow - (sortedRows.length - 1);
                    for (let i = 0; i < sortedRows.length; i++) {
                        const oldRow = sortedRows[i];
                        const newRow = offset + i;
                        for (const brick of bricks) {
                            if (brick.row === oldRow) {
                                brick.row = newRow;
                                brick.y = gridStartY + newRow * brickH;
                            }
                        }
                    }
                }

                // If we have fewer rows than GRID_ROWS_VISIBLE, spawn new rows at top and push down
                const currentRowCount = new Set(bricks.map(b => b.row)).size;
                const rowsToAdd = GRID_ROWS_VISIBLE - currentRowCount;

                if (rowsToAdd > 0) {
                    // Push all existing bricks down by rowsToAdd
                    for (const brick of bricks) {
                        brick.row += rowsToAdd;
                        brick.y = gridStartY + brick.row * brickH;
                    }
                    // Spawn new rows at the top
                    for (let r = 0; r < rowsToAdd; r++) {
                        spawnBrickRow(r);
                    }

                    level++;
                    score += 100 * level;
                    screenShake = 10;

                    // Reassign bucket colors based on new grid
                    syncBucketColors();
                }
            }

            // Check game over: if any brick goes below screen
            for (const brick of bricks) {
                if (brick.active && brick.y + brick.h > H) {
                    endGame();
                    return;
                }
            }
        }

        // ─── Game Init ───
        function initGame() {
            initPool();
            initParticles();
            score = 0;
            level = 1;
            screenShake = 0;
            rotatingAngle = 0;
            pickGameColors();
            initGrid();
            initBuckets();
            initGates();
            gameState = 'playing';
            overlay.classList.remove('active');
            startPanel.classList.remove('visible');
            gameOverPanel.classList.remove('visible');
        }

        function endGame() {
            gameState = 'gameover';
            finalScoreEl.textContent = score;
            finalLevelEl.textContent = 'Level ' + level;
            overlay.classList.add('active');
            gameOverPanel.classList.add('visible');
        }

        // ─── Input ───
        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function handleClick(e) {
            if (gameState !== 'playing') return;
            const pos = getCanvasPos(e);

            for (const bucket of buckets) {
                if (pos.x >= bucket.x && pos.x <= bucket.x + bucket.w &&
                    pos.y >= bucket.y && pos.y <= bucket.y + bucket.h) {
                    bucket.streaming = true;
                    bucket.streamDuration = 0;
                    bucket.streamTimer = 0;
                    bucket.tweenDir = 1;
                    bucket.tweenScale = 1.2;
                }
            }
        }

        canvas.addEventListener('click', handleClick);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick(e);
        });

        document.getElementById('startBtn').addEventListener('click', initGame);
        document.getElementById('restartBtn').addEventListener('click', initGame);

        // ─── Physics Update ───
        const GRAVITY = 0.15;
        const BALL_RADIUS = 4;
        const BOUNCE_DAMP = 0.6;

        // Stadium shape: two semicircle caps connected by straight top/bottom edges
        // The "opening" is a gap at the bottom-center where balls exit
        function trackDistanceInfo(x, y) {
            const cx = TRACK.cx;
            const cy = TRACK.cy;
            const hw = TRACK.halfWidth - TRACK.radius; // half-length of straight section
            const r = TRACK.radius;
            const wt = TRACK.wallThickness;

            // Clamp to find nearest point on stadium centerline
            let nearX, nearY, dist;
            if (x < cx - hw) {
                // Left cap
                const dx = x - (cx - hw);
                const dy = y - cy;
                dist = Math.sqrt(dx * dx + dy * dy);
                nearX = dx; nearY = dy;
            } else if (x > cx + hw) {
                // Right cap
                const dx = x - (cx + hw);
                const dy = y - cy;
                dist = Math.sqrt(dx * dx + dy * dy);
                nearX = dx; nearY = dy;
            } else {
                // Straight section — distance is just vertical distance from center
                dist = Math.abs(y - cy);
                nearX = 0;
                nearY = y - cy;
            }

            // Check if point is in the bottom exit opening
            const inOpening = (y > cy) && (x > cx - TRACK.openingWidth / 2) && (x < cx + TRACK.openingWidth / 2)
                && (x >= cx - hw) && (x <= cx + hw);

            const onWall = dist >= r - wt && dist <= r + wt;
            const inside = dist < r - wt;

            return { dist, onWall, inside, inOpening, nearX, nearY };
        }

        function update() {
            if (gameState !== 'playing') return;

            // Track is static (no rotation needed)

            // Screen shake decay
            if (screenShake > 0) {
                screenShake *= 0.9;
                screenShakeX = (Math.random() - 0.5) * screenShake * scale;
                screenShakeY = (Math.random() - 0.5) * screenShake * scale;
                if (screenShake < 0.1) { screenShake = 0; screenShakeX = 0; screenShakeY = 0; }
            }

            // Update buckets
            for (const bucket of buckets) {
                // Tween
                if (bucket.tweenDir !== 0) {
                    if (bucket.tweenDir === 1) {
                        bucket.tweenScale += 0.02;
                        if (bucket.tweenScale >= 1.15) bucket.tweenDir = -1;
                    } else {
                        bucket.tweenScale -= 0.02;
                        if (bucket.tweenScale <= 1) {
                            bucket.tweenScale = 1;
                            bucket.tweenDir = 0;
                        }
                    }
                }

                // Stream balls
                if (bucket.streaming) {
                    bucket.streamTimer++;
                    bucket.streamDuration++;
                    if (bucket.streamTimer >= bucket.streamInterval) {
                        bucket.streamTimer = 0;
                        const bx = bucket.x + bucket.w / 2 + (Math.random() - 0.5) * s(20);
                        const by = bucket.y + bucket.h;
                        const r = s(BALL_RADIUS);
                        spawnBall(bx, by, (Math.random() - 0.5) * s(0.5), s(1.5 + Math.random()), r, bucket.colorName);
                    }
                    if (bucket.streamDuration >= bucket.maxStreamDuration) {
                        bucket.streaming = false;
                    }
                }
            }

            // Update balls
            for (let i = 0; i < ballPool.length; i++) {
                const b = ballPool[i];
                if (!b.active) continue;

                b.vy += GRAVITY * scale;
                b.x += b.vx;
                b.y += b.vy;

                // Wall bounce
                if (b.x - b.radius < 0) { b.x = b.radius; b.vx = Math.abs(b.vx) * BOUNCE_DAMP; }
                if (b.x + b.radius > W) { b.x = W - b.radius; b.vx = -Math.abs(b.vx) * BOUNCE_DAMP; }

                // Check gate collision
                if (!b.multiplied) {
                    for (const gate of gates) {
                        if (b.x >= gate.x && b.x <= gate.x + gate.w &&
                            b.y >= gate.y && b.y <= gate.y + gate.h) {
                            b.multiplied = true;
                            gate.glow = 1;
                            // Spawn extra balls
                            for (let m = 1; m < gate.multiplier; m++) {
                                spawnBall(
                                    b.x + (Math.random() - 0.5) * s(10),
                                    b.y,
                                    (Math.random() - 0.5) * s(2),
                                    b.vy * (0.8 + Math.random() * 0.4),
                                    b.radius,
                                    b.colorName
                                );
                            }
                            break;
                        }
                    }
                }

                // Track zone collision (stadium shape)
                const tInfo = trackDistanceInfo(b.x, b.y);

                if (!tInfo.inOpening && tInfo.onWall) {
                    // Compute normal for bounce
                    const cx = TRACK.cx;
                    const cy = TRACK.cy;
                    const hw = TRACK.halfWidth - TRACK.radius;
                    let nx, ny;

                    if (b.x < cx - hw) {
                        // Left cap — normal points from cap center
                        const cdx = b.x - (cx - hw);
                        const cdy = b.y - cy;
                        const cd = Math.sqrt(cdx * cdx + cdy * cdy) || 1;
                        nx = cdx / cd; ny = cdy / cd;
                    } else if (b.x > cx + hw) {
                        // Right cap
                        const cdx = b.x - (cx + hw);
                        const cdy = b.y - cy;
                        const cd = Math.sqrt(cdx * cdx + cdy * cdy) || 1;
                        nx = cdx / cd; ny = cdy / cd;
                    } else {
                        // Straight section — normal is purely vertical
                        nx = 0;
                        ny = (b.y > cy) ? 1 : -1;
                    }

                    // Push ball out of wall
                    if (tInfo.dist < TRACK.radius) {
                        // Inside wall, push inward
                        const target = TRACK.radius - TRACK.wallThickness - b.radius;
                        if (b.x < cx - hw) {
                            b.x = (cx - hw) + nx * target;
                            b.y = cy + ny * target;
                        } else if (b.x > cx + hw) {
                            b.x = (cx + hw) + nx * target;
                            b.y = cy + ny * target;
                        } else {
                            b.y = cy + ny * target;
                        }
                    } else {
                        // Outside wall, push outward
                        const target = TRACK.radius + TRACK.wallThickness + b.radius;
                        if (b.x < cx - hw) {
                            b.x = (cx - hw) + nx * target;
                            b.y = cy + ny * target;
                        } else if (b.x > cx + hw) {
                            b.x = (cx + hw) + nx * target;
                            b.y = cy + ny * target;
                        } else {
                            b.y = cy + ny * target;
                        }
                    }

                    const dot = b.vx * nx + b.vy * ny;
                    b.vx -= 2 * dot * nx * BOUNCE_DAMP;
                    b.vy -= 2 * dot * ny * BOUNCE_DAMP;
                }

                // Inside track — apply gentle horizontal push toward exit
                if (tInfo.inside) {
                    // Push balls toward the bottom opening
                    const toCenterX = TRACK.cx - b.x;
                    const dist = Math.abs(toCenterX) || 1;
                    b.vx += (toCenterX / dist) * 0.03 * scale;
                    b.vy += 0.02 * scale; // nudge downward toward exit
                }

                // Brick collisions
                for (const brick of bricks) {
                    if (!brick.active) continue;

                    // AABB vs circle
                    const closestX = Math.max(brick.x, Math.min(b.x, brick.x + brick.w));
                    const closestY = Math.max(brick.y, Math.min(b.y, brick.y + brick.h));
                    const cdx = b.x - closestX;
                    const cdy = b.y - closestY;
                    const cdist = Math.sqrt(cdx * cdx + cdy * cdy);

                    if (cdist < b.radius) {
                        // Bounce ball
                        if (cdist > 0) {
                            const nx = cdx / cdist;
                            const ny = cdy / cdist;
                            b.x = closestX + nx * b.radius;
                            b.y = closestY + ny * b.radius;
                            const dot = b.vx * nx + b.vy * ny;
                            b.vx -= 2 * dot * nx * BOUNCE_DAMP;
                            b.vy -= 2 * dot * ny * BOUNCE_DAMP;
                        } else {
                            b.vy = -Math.abs(b.vy) * BOUNCE_DAMP;
                            b.y = brick.y - b.radius;
                        }

                        // Color match check — fill a divot
                        if (b.colorName === brick.colorName) {
                            // Find first empty divot
                            const emptyIdx = brick.divots.indexOf(false);
                            if (emptyIdx !== -1) {
                                brick.divots[emptyIdx] = true;
                                brick.health--;
                                brick.pulseTimer = 8;
                                score += 10;
                                // If all divots filled, start pop timer
                                if (brick.health <= 0) {
                                    brick.popTimer = 12; // short delay before pop
                                }
                            }
                        }

                        deactivateBall(b);
                        break;
                    }
                }

                // Off screen bottom
                if (b.y > H + s(20)) {
                    deactivateBall(b);
                }
            }

            // Update gate glow
            for (const gate of gates) {
                if (gate.glow > 0) gate.glow -= 0.03;
            }

            // Update particles
            for (const p of particles) {
                if (!p.active) continue;
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.05 * scale;
                p.life -= 1 / p.maxLife;
                if (p.life <= 0) p.active = false;
            }

            // Brick pulse timer & pop timer
            for (const brick of bricks) {
                if (brick.pulseTimer > 0) brick.pulseTimer--;
                if (brick.popTimer > 0) {
                    brick.popTimer--;
                    if (brick.popTimer <= 0) {
                        brick.active = false;
                        score += 50;
                        spawnParticles(brick.x + brick.w / 2, brick.y + brick.h / 2, brick.color, 15);
                        screenShake = 4;
                    }
                }
            }

            // Check if a color was fully cleared — swap bucket
            syncBucketColors();

            // Check row clears
            checkRowCleared();
        }

        // ─── Drawing ───
        function drawRoundRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        function draw() {
            ctx.save();
            ctx.clearRect(0, 0, W, H);

            // Background gradient
            const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
            bgGrad.addColorStop(0, '#1a1230');
            bgGrad.addColorStop(1, '#0d0a1a');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, W, H);

            // Apply screen shake
            ctx.translate(screenShakeX, screenShakeY);

            // Draw buckets (iOS 26 liquid glass style, synced with grid)
            for (const bucket of buckets) {
                ctx.save();
                const cx = bucket.x + bucket.w / 2;
                const cy = bucket.y + bucket.h / 2;
                ctx.translate(cx, cy);
                ctx.scale(bucket.tweenScale, bucket.tweenScale);
                ctx.translate(-cx, -cy);

                const col = COLORS[bucket.colorName];
                const bR = s(14);

                // Drop shadow
                ctx.shadowColor = 'rgba(0,0,0,0.2)';
                ctx.shadowBlur = s(6);
                ctx.shadowOffsetY = s(2);
                drawRoundRect(bucket.x, bucket.y, bucket.w, bucket.h, bR);
                ctx.fillStyle = col.dark;
                ctx.fill();
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;

                // Glass body
                const grad = ctx.createLinearGradient(bucket.x, bucket.y, bucket.x, bucket.y + bucket.h);
                grad.addColorStop(0, col.pastel);
                grad.addColorStop(0.5, col.mid);
                grad.addColorStop(1, col.dark);
                drawRoundRect(bucket.x, bucket.y, bucket.w, bucket.h, bR);
                ctx.fillStyle = grad;
                ctx.fill();

                // Specular shine band
                ctx.save();
                drawRoundRect(bucket.x, bucket.y, bucket.w, bucket.h, bR);
                ctx.clip();
                const shGrad = ctx.createLinearGradient(bucket.x, bucket.y, bucket.x, bucket.y + bucket.h * 0.4);
                shGrad.addColorStop(0, 'rgba(255,255,255,0.45)');
                shGrad.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = shGrad;
                ctx.fillRect(bucket.x, bucket.y, bucket.w, bucket.h * 0.4);
                ctx.restore();

                // Inner highlight border
                drawRoundRect(bucket.x + s(1), bucket.y + s(1), bucket.w - s(2), bucket.h - s(2), bR - s(0.5));
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = s(1.5);
                ctx.stroke();

                // Bucket nozzle
                ctx.beginPath();
                ctx.arc(cx, bucket.y + bucket.h, s(7), 0, Math.PI, false);
                ctx.fillStyle = col.dark;
                ctx.fill();

                // Label
                ctx.fillStyle = '#fff';
                ctx.font = `bold ${s(10)}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(bucket.colorName.toUpperCase(), cx, cy);

                ctx.restore();
            }

            // Draw gates
            for (const gate of gates) {
                ctx.globalAlpha = 0.5 + gate.glow * 0.5;
                drawRoundRect(gate.x, gate.y, gate.w, gate.h, s(4));
                ctx.fillStyle = `rgba(255, 220, 100, ${0.15 + gate.glow * 0.3})`;
                ctx.fill();
                ctx.strokeStyle = `rgba(255, 220, 100, ${0.6 + gate.glow * 0.4})`;
                ctx.lineWidth = s(1.5);
                ctx.stroke();

                ctx.fillStyle = '#ffd700';
                ctx.font = `bold ${s(12)}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`x${gate.multiplier}`, gate.x + gate.w / 2, gate.y + gate.h / 2);
                ctx.globalAlpha = 1;
            }

            // Draw track zone (stadium/pill shape)
            ctx.save();
            const tcx = TRACK.cx;
            const tcy = TRACK.cy;
            const thw = TRACK.halfWidth - TRACK.radius; // half straight section
            const tr = TRACK.radius;
            const twt = TRACK.wallThickness;
            const openHalf = TRACK.openingWidth / 2;

            // Helper to draw the stadium path with bottom opening
            function drawTrackPath() {
                ctx.beginPath();
                // Start from right side of opening, go right along bottom
                ctx.moveTo(tcx + openHalf, tcy + tr);
                // Bottom straight right
                ctx.lineTo(tcx + thw, tcy + tr);
                // Right semicircle cap (bottom to top)
                ctx.arc(tcx + thw, tcy, tr, Math.PI / 2, -Math.PI / 2);
                // Top straight (right to left)
                ctx.lineTo(tcx - thw, tcy - tr);
                // Left semicircle cap (top to bottom)
                ctx.arc(tcx - thw, tcy, tr, -Math.PI / 2, Math.PI / 2);
                // Bottom straight left
                ctx.lineTo(tcx - openHalf, tcy + tr);
            }

            // Outer glow
            drawTrackPath();
            ctx.strokeStyle = 'rgba(180, 160, 255, 0.12)';
            ctx.lineWidth = twt + s(8);
            ctx.lineCap = 'round';
            ctx.stroke();

            // Main wall
            drawTrackPath();
            ctx.strokeStyle = 'rgba(180, 160, 255, 0.5)';
            ctx.lineWidth = twt;
            ctx.lineCap = 'round';
            ctx.stroke();

            // Opening indicator dots
            ctx.fillStyle = 'rgba(180, 160, 255, 0.8)';
            ctx.beginPath();
            ctx.arc(tcx - openHalf, tcy + tr, s(4), 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(tcx + openHalf, tcy + tr, s(4), 0, Math.PI * 2);
            ctx.fill();

            // Animated chevrons inside the track to show flow direction
            ctx.globalAlpha = 0.2;
            const chevronTime = (Date.now() / 600) % 1;
            for (let i = 0; i < 3; i++) {
                const t = ((chevronTime + i / 3) % 1);
                const cx2 = tcx + thw * (1 - 2 * t);
                ctx.beginPath();
                ctx.moveTo(cx2 - s(4), tcy - s(4));
                ctx.lineTo(cx2 + s(4), tcy);
                ctx.lineTo(cx2 - s(4), tcy + s(4));
                ctx.strokeStyle = 'rgba(200, 180, 255, 0.8)';
                ctx.lineWidth = s(2);
                ctx.stroke();
            }
            ctx.globalAlpha = 1;

            ctx.restore();

            // Draw bricks (iOS 26 liquid glass with centered divots)
            const now = Date.now() / 1000;
            for (const brick of bricks) {
                if (!brick.active) continue;

                ctx.save();
                let popScale = 1;
                if (brick.popTimer > 0) {
                    popScale = 1 + (1 - brick.popTimer / 12) * 0.3;
                    ctx.globalAlpha = brick.popTimer / 12;
                }
                const jellyT = now * 2.0 + brick.jellyPhase;
                const jellyX = 1 + Math.sin(jellyT) * 0.012;
                const jellyY = 1 + Math.cos(jellyT) * 0.012;
                const pulse = brick.pulseTimer > 0 ? 1 + Math.sin(brick.pulseTimer * 0.8) * 0.10 : 1;
                const sx = pulse * popScale * jellyX;
                const sy = pulse * popScale * jellyY;
                const bcx = brick.x + brick.w / 2;
                const bcy = brick.y + brick.h / 2;
                if (sx !== 1 || sy !== 1) {
                    ctx.translate(bcx, bcy);
                    ctx.scale(sx, sy);
                    ctx.translate(-bcx, -bcy);
                }

                const bR = s(16); // iOS 26 generous radius
                const col = COLORS[brick.colorName];

                // ── Drop shadow ──
                ctx.shadowColor = 'rgba(0,0,0,0.25)';
                ctx.shadowBlur = s(10);
                ctx.shadowOffsetY = s(4);
                drawRoundRect(brick.x, brick.y, brick.w, brick.h, bR);
                ctx.fillStyle = col.dark;
                ctx.fill();
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;

                // ── Glass body ──
                drawRoundRect(brick.x, brick.y, brick.w, brick.h, bR);
                const bodyGrad = ctx.createLinearGradient(brick.x, brick.y, brick.x, brick.y + brick.h);
                bodyGrad.addColorStop(0, col.pastel);
                bodyGrad.addColorStop(0.5, col.mid);
                bodyGrad.addColorStop(1, col.dark);
                ctx.fillStyle = bodyGrad;
                ctx.fill();

                // ── Frosted glass overlay ──
                drawRoundRect(brick.x, brick.y, brick.w, brick.h, bR);
                ctx.fillStyle = 'rgba(255,255,255,0.10)';
                ctx.fill();

                // ── Top specular band (liquid glass shine) ──
                ctx.save();
                drawRoundRect(brick.x, brick.y, brick.w, brick.h, bR);
                ctx.clip();
                const shineH = brick.h * 0.38;
                const shineGrad = ctx.createLinearGradient(brick.x, brick.y, brick.x, brick.y + shineH);
                shineGrad.addColorStop(0, 'rgba(255,255,255,0.50)');
                shineGrad.addColorStop(0.5, 'rgba(255,255,255,0.18)');
                shineGrad.addColorStop(1, 'rgba(255,255,255,0.0)');
                ctx.fillStyle = shineGrad;
                ctx.fillRect(brick.x, brick.y, brick.w, shineH);
                ctx.restore();

                // ── Inner highlight border (top/left light, bottom/right dark) ──
                drawRoundRect(brick.x + s(1), brick.y + s(1), brick.w - s(2), brick.h - s(2), bR - s(0.5));
                ctx.strokeStyle = 'rgba(255,255,255,0.30)';
                ctx.lineWidth = s(1.5);
                ctx.stroke();

                // ── Outer border ──
                drawRoundRect(brick.x, brick.y, brick.w, brick.h, bR);
                ctx.strokeStyle = 'rgba(0,0,0,0.12)';
                ctx.lineWidth = s(1);
                ctx.stroke();

                // ── Divots: perfectly centered and evenly spaced ──
                const dR = s(10); // divot radius
                const divotCY = brick.y + brick.h / 2; // vertically centered
                // Evenly space divots: total span = (N-1)*spacing, centered in brick
                const divotTotalSpan = (DIVOTS_PER_BRICK - 1) * (dR * 2.8);
                const divotStartX = bcx - divotTotalSpan / 2;

                for (let d = 0; d < DIVOTS_PER_BRICK; d++) {
                    const dx = divotStartX + d * (dR * 2.8);
                    const dy = divotCY;

                    if (brick.divots[d]) {
                        // ── Filled: ball seated in recess ──

                        // Shadow ring around ball
                        ctx.beginPath();
                        ctx.arc(dx, dy, dR + s(2), 0, Math.PI * 2);
                        const ringGrad = ctx.createRadialGradient(dx, dy, dR * 0.7, dx, dy, dR + s(2));
                        ringGrad.addColorStop(0, 'rgba(0,0,0,0.4)');
                        ringGrad.addColorStop(1, 'rgba(0,0,0,0)');
                        ctx.fillStyle = ringGrad;
                        ctx.fill();

                        // Ball sphere
                        const bGrad = ctx.createRadialGradient(
                            dx - dR * 0.3, dy - dR * 0.35, dR * 0.08,
                            dx, dy, dR
                        );
                        bGrad.addColorStop(0, '#ffffff');
                        bGrad.addColorStop(0.2, col.pastel);
                        bGrad.addColorStop(0.7, col.mid);
                        bGrad.addColorStop(1, col.dark);
                        ctx.beginPath();
                        ctx.arc(dx, dy, dR, 0, Math.PI * 2);
                        ctx.fillStyle = bGrad;
                        ctx.fill();

                        // Specular dot
                        const specR = dR * 0.32;
                        const specGrad = ctx.createRadialGradient(
                            dx - dR * 0.22, dy - dR * 0.28, 0,
                            dx - dR * 0.22, dy - dR * 0.28, specR
                        );
                        specGrad.addColorStop(0, 'rgba(255,255,255,0.85)');
                        specGrad.addColorStop(1, 'rgba(255,255,255,0)');
                        ctx.beginPath();
                        ctx.arc(dx - dR * 0.22, dy - dR * 0.28, specR, 0, Math.PI * 2);
                        ctx.fillStyle = specGrad;
                        ctx.fill();

                        // Thin bright rim
                        ctx.beginPath();
                        ctx.arc(dx, dy, dR, 0, Math.PI * 2);
                        ctx.strokeStyle = 'rgba(255,255,255,0.35)';
                        ctx.lineWidth = s(1);
                        ctx.stroke();

                    } else {
                        // ── Empty: deep physical recess ──

                        // Outer bevel lip
                        ctx.beginPath();
                        ctx.arc(dx, dy, dR + s(2), 0, Math.PI * 2);
                        const lipGrad = ctx.createLinearGradient(
                            dx - dR, dy - dR, dx + dR, dy + dR
                        );
                        lipGrad.addColorStop(0, 'rgba(255,255,255,0.28)');
                        lipGrad.addColorStop(0.45, 'rgba(255,255,255,0.05)');
                        lipGrad.addColorStop(0.55, 'rgba(0,0,0,0.08)');
                        lipGrad.addColorStop(1, 'rgba(0,0,0,0.30)');
                        ctx.fillStyle = lipGrad;
                        ctx.fill();

                        // Deep cavity
                        const cavGrad = ctx.createRadialGradient(
                            dx + dR * 0.12, dy + dR * 0.15, 0,
                            dx, dy, dR
                        );
                        cavGrad.addColorStop(0, 'rgba(0,0,0,0.55)');
                        cavGrad.addColorStop(0.5, 'rgba(0,0,0,0.35)');
                        cavGrad.addColorStop(0.85, col.dark);
                        cavGrad.addColorStop(1, col.mid);
                        ctx.beginPath();
                        ctx.arc(dx, dy, dR, 0, Math.PI * 2);
                        ctx.fillStyle = cavGrad;
                        ctx.fill();

                        // Inner concave light crescent (top-left)
                        const crescGrad = ctx.createRadialGradient(
                            dx - dR * 0.25, dy - dR * 0.3, 0,
                            dx, dy, dR * 0.8
                        );
                        crescGrad.addColorStop(0, 'rgba(255,255,255,0.12)');
                        crescGrad.addColorStop(0.5, 'rgba(255,255,255,0.02)');
                        crescGrad.addColorStop(1, 'rgba(0,0,0,0)');
                        ctx.beginPath();
                        ctx.arc(dx, dy, dR * 0.8, 0, Math.PI * 2);
                        ctx.fillStyle = crescGrad;
                        ctx.fill();

                        // Inner ring bevel
                        ctx.beginPath();
                        ctx.arc(dx, dy, dR, 0, Math.PI * 2);
                        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                        ctx.lineWidth = s(1.5);
                        ctx.stroke();
                    }
                }

                ctx.restore();
            }

            // Draw balls
            for (let i = 0; i < ballPool.length; i++) {
                const b = ballPool[i];
                if (!b.active) continue;

                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                const ballGrad = ctx.createRadialGradient(
                    b.x - b.radius * 0.3, b.y - b.radius * 0.3, 0,
                    b.x, b.y, b.radius
                );
                ballGrad.addColorStop(0, '#fff');
                ballGrad.addColorStop(0.4, b.color);
                ballGrad.addColorStop(1, COLORS[b.colorName].dark);
                ctx.fillStyle = ballGrad;
                ctx.fill();
            }

            // Draw particles
            for (const p of particles) {
                if (!p.active) continue;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                ctx.globalAlpha = 1;
            }

            // HUD
            ctx.fillStyle = '#fff';
            ctx.font = `bold ${s(16)}px sans-serif`;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText(`Score: ${score}`, s(10), H - s(28));

            ctx.textAlign = 'right';
            ctx.fillText(`Level ${level}`, W - s(10), H - s(28));

            // Ball count indicator
            ctx.textAlign = 'center';
            ctx.font = `${s(10)}px sans-serif`;
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.fillText(`Balls: ${activeBalls}`, W / 2, H - s(28));

            ctx.restore();
        }

        // ─── Game Loop ───
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    })();
    </script>
</body>
</html>
